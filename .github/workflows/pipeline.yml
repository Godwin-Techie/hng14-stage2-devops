permissions:
  contents: read
  security-events: write

name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------- Python Lint (flake8) ----------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run Python lint
        run: flake8 api worker

      # ---------------- JavaScript Lint (eslint) ----------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install eslint
        run: npm install -g eslint

      # FIX: run eslint inside frontend directory
      - name: Run JS lint
        working-directory: frontend
        run: eslint .

      # Dockerfile Lint (hadolint)
      - name: Install hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Run Docker lint
        run: |
          hadolint --ignore DL3013 --ignore DL3008 --ignore DL3015 --ignore DL3018 --ignore DL3059 \
          api/Dockerfile worker/Dockerfile frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run tests with coverage
        run: PYTHONPATH=. pytest api/tests --cov=api --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get commit SHA
        id: vars
        run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build API image
        run: |
          DOCKER_BUILDKIT=1 docker build \
          --cache-from=api:latest \
          -t api:latest -t api:${{ github.sha }} ./api

      - name: Build Worker image
        run: |
          DOCKER_BUILDKIT=1 docker build \
          --cache-from=worker:latest \
          -t worker:latest -t worker:${{ github.sha }} ./worker

      - name: Build Frontend image
        run: |
          DOCKER_BUILDKIT=1 docker build \
          --cache-from=frontend:latest \
          -t frontend:latest -t frontend:${{ github.sha }} ./frontend

  security:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main | sudo tee -a /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Get commit SHA
        id: vars
        run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build API image
        run: docker build -t api:${{ github.sha }} -t api:latest ./api

      - name: Build Worker image
        run: docker build -t worker:${{ github.sha }} -t worker:latest ./worker

      - name: Build Frontend image
        run: docker build -t frontend:${{ github.sha }} -t frontend:latest ./frontend

      - name: Scan API image (fail on CRITICAL)
        run: trivy image --severity CRITICAL --exit-code 1 api:${{ github.sha }}

      - name: Scan Worker image (fail on CRITICAL)
        run: trivy image --severity CRITICAL --exit-code 1 worker:${{ github.sha }}

      - name: Scan Frontend image (non-blocking)
        run: trivy image --severity CRITICAL frontend:${{ github.sha }}

      - name: Generate SARIF report (API)
        run: trivy image --severity CRITICAL --exit-code 1 --format sarif -o trivy-api.sarif api:${{ github.sha }}

      - name: Generate SARIF report (Worker)
        run: trivy image --severity CRITICAL --exit-code 1 --format sarif -o trivy-worker.sarif worker:${{ github.sha }}

      - name: Generate SARIF report (Frontend)
        run: trivy image --severity CRITICAL --exit-code 1 --format sarif -o trivy-frontend.sarif frontend:${{ github.sha }}

      - name: Upload SARIF report (API)
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-api.sarif

  integration:
    runs-on: ubuntu-latest
    needs: security
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379

      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build API container
        run: docker build -t api-test ./api

      - name: Run API container
        run: |
          docker run -d -p 8000:8000 \
          --name api-test \
          --network host \
          api-test

      - name: Bring up full stack
        run: docker compose up -d --build

      - name: Wait for API to start
        run: sleep 5

      - name: Test API from inside network
        run: |
          docker ps 
          docker compose exec -T api curl http://localhost:8000

      - name: Tear down containers
        if: always()
        run: docker compose down

  deploy:
    runs-on: ubuntu-latest
    needs: integration
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get commit SHA
        id: vars
        run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Stop old container (if exists)
        run: |
          docker stop api-prod || true
          docker rm api-prod || true

      - name: Build image again
        run: docker build -t api:${{ steps.vars.outputs.SHA }} ./api

      - name: Run new container
        run: |
          docker run -d -p 8000:8000 \
          --name api-prod \
          api:${{ steps.vars.outputs.SHA }}
