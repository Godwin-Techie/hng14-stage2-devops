name: CI/CD Pipeline

on:
  push:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------------- Python Lint (flake8) ----------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run Python lint
        run: flake8 api worker

      # ---------------- JavaScript Lint (eslint) ----------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install eslint
        run: npm install -g eslint

      # 🔥 FIX: run eslint inside frontend directory
      - name: Run JS lint
        working-directory: frontend
        run: eslint .

      # ---------------- Dockerfile Lint (hadolint) ----------------
      - name: Install hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Run Docker lint
        run: |
          hadolint --ignore DL3013 --ignore DL3008 --ignore DL3015 --ignore DL3018 --ignore DL3059 \
          api/Dockerfile worker/Dockerfile frontend/Dockerfile

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r api/requirements.txt

      - name: Run tests with coverage
        run: PYTHONPATH=. pytest api/tests --cov=api --cov-report=xml

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get commit SHA
        id: vars
        run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build API image
        run: docker build -t api:${{ steps.vars.outputs.SHA }} ./api

      - name: Build Worker image
        run: docker build -t worker:${{ steps.vars.outputs.SHA }} ./worker

      - name: Build Frontend image
        run: docker build -t frontend:${{ steps.vars.outputs.SHA }} ./frontend
